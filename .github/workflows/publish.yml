name: Generate & Publish Article

on:
  # Hourly for today (Feb 26, 2026) -- disable after today
  schedule:
    - cron: '0 * * * *'
  # Manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node generate.js

      - name: Commit and push
        run: |
          git config user.name "nichtagentur"
          git config user.email "github@nichtagentur.at"
          git add -A
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Auto-publish: new article $(date -u +%Y-%m-%d_%H%M)"
          git push
